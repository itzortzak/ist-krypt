<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audit · Ιστορικά Κρυπτογραφήματα v20</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <div class="container nav">
    <a class="brand" href="index.html"><div class="brand-mark"></div><div class="brand-text">Ιστορικά Κρυπτογραφήματα<small>Audit mode</small></div></a>
    <nav class="nav-links"><a href="index.html">Αρχική</a><a href="instructions.html">Οδηγίες</a><a href="info.html">Πληροφορίες</a><a href="audit.html">Audit</a></nav>
  </div>
</header>
<main class="container page-header">
  <div class="hero-card">
    <div class="kicker">Φιλολογικός έλεγχος λημμάτων</div>
    <h1>Audit mode</h1>
    <p>Η σελίδα αυτή δείχνει την κατάσταση ελέγχου του dataset. Στη v20 έχει επιμεληθεί βιβλιοκεντρικά το πρώτο κεφάλαιο. Τα υπόλοιπα παραμένουν ρητά σημειωμένα ως εκκρεμή.</p>
    <div id="auditSummary" class="grid-2"></div>
  </div>
  <section class="section">
    <div class="panel">
      <h2>Κατάλογος λημμάτων</h2>
      <div id="auditTable"></div>
    </div>
  </section>
</main>
<script>
async function initAudit(){
  const res = await fetch("data/puzzles.json");
  const puzzles = await res.json();
  const chapters = [...new Set(puzzles.map(p=>p.chapter))];
  const summary = chapters.map(ch=>{
    const items = puzzles.filter(p=>p.chapter===ch);
    const reviewed = items.filter(p=>p.reviewed).length;
    return `<div class="stats-card"><span class="small">${ch}</span><b>${reviewed}/${items.length}</b></div>`;
  }).join("");
  document.getElementById("auditSummary").innerHTML = summary;

  const rows = puzzles.map(p=>`<tr>
    <td>${p.id}</td>
    <td>${p.chapter}</td>
    <td>${p.section}</td>
    <td>${p.answer}</td>
    <td>${p.reviewed ? "Ναι" : "Όχι"}</td>
    <td>${p.sourceBasis || "—"}</td>
    <td>${p.notes || "—"}</td>
  </tr>`).join("");
  document.getElementById("auditTable").innerHTML = `<div style="overflow:auto"><table style="width:100%;border-collapse:collapse">
    <thead><tr>
      <th style="text-align:left;padding:8px;border-bottom:1px solid #ccb58e">ID</th>
      <th style="text-align:left;padding:8px;border-bottom:1px solid #ccb58e">Κεφάλαιο</th>
      <th style="text-align:left;padding:8px;border-bottom:1px solid #ccb58e">Υποενότητα</th>
      <th style="text-align:left;padding:8px;border-bottom:1px solid #ccb58e">Λήμμα</th>
      <th style="text-align:left;padding:8px;border-bottom:1px solid #ccb58e">Ελεγμένο</th>
      <th style="text-align:left;padding:8px;border-bottom:1px solid #ccb58e">Βάση</th>
      <th style="text-align:left;padding:8px;border-bottom:1px solid #ccb58e">Σημείωση</th>
    </tr></thead><tbody>${rows}</tbody></table></div>`;
}
document.addEventListener("DOMContentLoaded", initAudit);
</script>
</body>
</html>
